[defaults]
inventory=./inventory
remote_user= devops
ask_pass=False
# gathering=smart
callbacks_enabled=timer,profile_tasks
roles_path = /home/devops/ansible/roles:/usr/share/ansible/roles
collections_path = ./collections:/usr/share/ansible/collections

[privilege_escalation]
become=true
become_ask_pass=false
become_method=sudo
become_user=root
